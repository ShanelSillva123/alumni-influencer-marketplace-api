openapi: 3.0.0

info:
  title: Alumni Influencer Marketplace API
  version: 1.0.0
  description: Full API documentation for the Alumni Influencer Marketplace API

servers:
  - url: http://localhost:5000

tags:
  - name: System
    description: System endpoints
  - name: Auth
    description: Authentication and account management
  - name: Profiles
    description: Profile management endpoints
  - name: Degrees
    description: Degree management endpoints
  - name: Employment
    description: Employment history management endpoints
  - name: Certifications
    description: Certification management endpoints
  - name: Courses
    description: Short course management endpoints
  - name: Licences
    description: Licence management endpoints
  - name: Bids
    description: Blind bidding management endpoints
  - name: Notifications
    description: Notification management endpoints
  - name: Analytics
    description: Analytics endpoints
  - name: Admin
    description: Administrative endpoints
  - name: API Keys
    description: API key management endpoints
  - name: Public
    description: Public developer API endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request successful
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid request

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: amount
              message:
                type: string
                example: "\"amount\" is required"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 8d84d3c4-cf84-4c12-9bb1-3e9a5fa8fd9b
        email:
          type: string
          format: email
          example: student@university.ac.uk
        role:
          type: string
          example: USER
        isVerified:
          type: boolean
          example: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-03-21T10:30:00.000Z
        createdAt:
          type: string
          format: date-time
          example: 2026-03-21T08:00:00.000Z

    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: student@university.ac.uk
        password:
          type: string
          example: StrongPassword123!
        role:
          type: string
          example: USER

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: secure_verification_token

    ResendVerificationRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: student@university.ac.uk

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: student@university.ac.uk
        password:
          type: string
          example: StrongPassword123!

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: student@university.ac.uk

    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          example: secure_reset_token
        newPassword:
          type: string
          example: NewStrongPassword123!

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          example: StrongPassword123!
        newPassword:
          type: string
          example: NewStrongPassword123!

    RegisterResponseData:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully. Please verify your email.
        user:
          $ref: '#/components/schemas/User'
        verificationToken:
          type: string
          example: secure_verification_token

    LoginResponseData:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.token
        user:
          $ref: '#/components/schemas/User'

    ForgotPasswordResponseData:
      type: object
      properties:
        message:
          type: string
          example: If the account exists, a password reset link has been generated
        resetToken:
          type: string
          example: secure_reset_token

    SimpleMessageData:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully

    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 7c2d0ad8-7f3c-4fd5-9bd2-0d258c7f8a11
        userId:
          type: string
          format: uuid
          example: 8d84d3c4-cf84-4c12-9bb1-3e9a5fa8fd9b
        fullName:
          type: string
          example: Shanel Silva
        biography:
          type: string
          nullable: true
          example: Full-stack software engineer
        linkedInUrl:
          type: string
          format: uri
          nullable: true
          example: https://www.linkedin.com/in/shanel-silva
        profileImageUrl:
          type: string
          format: uri
          nullable: true
          example: https://example.com/profile.jpg
        currentJobTitle:
          type: string
          nullable: true
          example: Software Engineer
        currentCompany:
          type: string
          nullable: true
          example: Example Company
        profileCompletenessScore:
          type: integer
          example: 85
        createdAt:
          type: string
          format: date-time
          example: 2026-04-02T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-02T10:30:00.000Z
        degrees:
          type: array
          items:
            $ref: '#/components/schemas/Degree'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        licences:
          type: array
          items:
            $ref: '#/components/schemas/Licence'
        shortCourses:
          type: array
          items:
            $ref: '#/components/schemas/Course'
        employmentHistory:
          type: array
          items:
            $ref: '#/components/schemas/EmploymentHistory'

    CreateProfileRequest:
      type: object
      required:
        - fullName
      properties:
        fullName:
          type: string
          example: Shanel Silva
        biography:
          type: string
          nullable: true
          example: Full-stack engineer
        linkedInUrl:
          type: string
          format: uri
          nullable: true
          example: https://www.linkedin.com/in/shanel-silva
        profileImageUrl:
          type: string
          format: uri
          nullable: true
          example: https://example.com/profile.jpg
        currentJobTitle:
          type: string
          nullable: true
          example: Software Engineer
        currentCompany:
          type: string
          nullable: true
          example: Example Company

    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
          example: Shanel Silva
        biography:
          type: string
          nullable: true
          example: Updated biography
        linkedInUrl:
          type: string
          format: uri
          nullable: true
          example: https://www.linkedin.com/in/shanel-silva
        profileImageUrl:
          type: string
          format: uri
          nullable: true
          example: https://example.com/profile.jpg
        currentJobTitle:
          type: string
          nullable: true
          example: Senior Software Engineer
        currentCompany:
          type: string
          nullable: true
          example: Updated Company

    Degree:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 2b7eb1a1-b6f6-4dd8-a2f5-7a1f8cc77401
        profileId:
          type: string
          format: uuid
          example: 7c2d0ad8-7f3c-4fd5-9bd2-0d258c7f8a11
        institution:
          type: string
          example: University of Westminster
        degreeName:
          type: string
          example: Bachelor of Engineering
        fieldOfStudy:
          type: string
          nullable: true
          example: Software Engineering
        startDate:
          type: string
          format: date
          example: 2020-09-01
        endDate:
          type: string
          format: date
          nullable: true
          example: 2024-06-30
        grade:
          type: string
          nullable: true
          example: First Class
        description:
          type: string
          nullable: true
          example: Specialized in software engineering
        createdAt:
          type: string
          format: date-time
          example: 2026-04-06T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-06T10:30:00.000Z

    CreateDegreeRequest:
      type: object
      required:
        - institution
        - degreeName
        - startDate
      properties:
        institution:
          type: string
          example: University of Westminster
        degreeName:
          type: string
          example: Bachelor of Engineering
        fieldOfStudy:
          type: string
          nullable: true
          example: Software Engineering
        startDate:
          type: string
          format: date
          example: 2020-09-01
        endDate:
          type: string
          format: date
          nullable: true
          example: 2024-06-30
        grade:
          type: string
          nullable: true
          example: First Class
        description:
          type: string
          nullable: true
          example: Specialized in software engineering

    UpdateDegreeRequest:
      type: object
      properties:
        institution:
          type: string
        degreeName:
          type: string
        fieldOfStudy:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        grade:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    EmploymentHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        profileId:
          type: string
          format: uuid
        companyName:
          type: string
          example: Example Company
        jobTitle:
          type: string
          example: Software Engineer
        employmentType:
          type: string
          example: FULL_TIME
        location:
          type: string
          nullable: true
          example: London
        startDate:
          type: string
          format: date
          example: 2024-01-01
        endDate:
          type: string
          format: date
          nullable: true
          example: 2025-01-01
        isCurrent:
          type: boolean
          example: false
        description:
          type: string
          nullable: true
          example: Built backend systems
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEmploymentRequest:
      type: object
      required:
        - companyName
        - jobTitle
        - startDate
      properties:
        companyName:
          type: string
          example: Example Company
        jobTitle:
          type: string
          example: Software Engineer
        employmentType:
          type: string
          enum:
            - FULL_TIME
            - PART_TIME
            - CONTRACT
            - INTERNSHIP
            - FREELANCE
            - TEMPORARY
            - VOLUNTEER
            - OTHER
        location:
          type: string
          nullable: true
          example: London
        startDate:
          type: string
          format: date
          example: 2024-01-01
        endDate:
          type: string
          format: date
          nullable: true
          example: 2025-01-01
        isCurrent:
          type: boolean
          example: false
        description:
          type: string
          nullable: true
          example: Built backend systems

    UpdateEmploymentRequest:
      type: object
      properties:
        companyName:
          type: string
        jobTitle:
          type: string
        employmentType:
          type: string
          enum:
            - FULL_TIME
            - PART_TIME
            - CONTRACT
            - INTERNSHIP
            - FREELANCE
            - TEMPORARY
            - VOLUNTEER
            - OTHER
        location:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        isCurrent:
          type: boolean
        description:
          type: string
          nullable: true

    Certification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        profileId:
          type: string
          format: uuid
        title:
          type: string
          example: AWS Cloud Practitioner
        providerName:
          type: string
          example: Amazon Web Services
        courseUrl:
          type: string
          format: uri
          nullable: true
          example: https://aws.amazon.com
        completionDate:
          type: string
          format: date-time
          nullable: true
          example: 2025-01-10T00:00:00.000Z
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCertificationRequest:
      type: object
      required:
        - title
        - providerName
      properties:
        title:
          type: string
          example: AWS Cloud Practitioner
        providerName:
          type: string
          example: Amazon Web Services
        courseUrl:
          type: string
          format: uri
          nullable: true
          example: https://aws.amazon.com
        completionDate:
          type: string
          format: date-time
          nullable: true
          example: 2025-01-10T00:00:00.000Z

    UpdateCertificationRequest:
      type: object
      properties:
        title:
          type: string
        providerName:
          type: string
        courseUrl:
          type: string
          format: uri
          nullable: true
        completionDate:
          type: string
          format: date-time
          nullable: true

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        profileId:
          type: string
          format: uuid
        title:
          type: string
          example: Advanced Node.js
        providerName:
          type: string
          example: Coursera
        courseUrl:
          type: string
          format: uri
          nullable: true
          example: https://coursera.org
        completionDate:
          type: string
          format: date-time
          nullable: true
          example: 2025-02-01T00:00:00.000Z
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCourseRequest:
      type: object
      required:
        - title
        - providerName
      properties:
        title:
          type: string
          example: Advanced Node.js
        providerName:
          type: string
          example: Coursera
        courseUrl:
          type: string
          format: uri
          nullable: true
          example: https://coursera.org
        completionDate:
          type: string
          format: date-time
          nullable: true
          example: 2025-02-01T00:00:00.000Z

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string
        providerName:
          type: string
        courseUrl:
          type: string
          format: uri
          nullable: true
        completionDate:
          type: string
          format: date-time
          nullable: true

    Licence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        profileId:
          type: string
          format: uuid
        title:
          type: string
          example: Professional Licence
        awardingBody:
          type: string
          example: BCS
        awardingBodyUrl:
          type: string
          format: uri
          nullable: true
          example: https://www.bcs.org
        completionDate:
          type: string
          format: date-time
          nullable: true
          example: 2025-03-01T00:00:00.000Z
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateLicenceRequest:
      type: object
      required:
        - title
        - awardingBody
      properties:
        title:
          type: string
          example: Professional Licence
        awardingBody:
          type: string
          example: BCS
        awardingBodyUrl:
          type: string
          format: uri
          nullable: true
          example: https://www.bcs.org
        completionDate:
          type: string
          format: date-time
          nullable: true
          example: 2025-03-01T00:00:00.000Z

    UpdateLicenceRequest:
      type: object
      properties:
        title:
          type: string
        awardingBody:
          type: string
        awardingBodyUrl:
          type: string
          format: uri
          nullable: true
        completionDate:
          type: string
          format: date-time
          nullable: true

    Bid:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        bidDate:
          type: string
          format: date-time
        amount:
          type: number
          format: double
          example: 250.00
        status:
          type: string
          example: PENDING
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateBidRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          format: double
          example: 250.00

    UpdateBidRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          format: double
          example: 300.00

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
          example: Bid Updated
        message:
          type: string
          example: Your bid was updated successfully.
        type:
          type: string
          example: BID_UPDATED
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    CreateNotificationRequest:
      type: object
      required:
        - title
        - message
        - type
      properties:
        title:
          type: string
          example: Bid Updated
        message:
          type: string
          example: Your bid was updated successfully.
        type:
          type: string
          enum:
            - BID_CREATED
            - BID_UPDATED
            - BID_CANCELLED
            - BID_WON
            - BID_LOST

    AnalyticsDashboard:
      type: object
      properties:
        profile:
          type: object
          properties:
            exists:
              type: boolean
              example: true
            completenessPercentage:
              type: number
              example: 85
            fullName:
              type: string
              nullable: true
              example: Shanel Silva
            currentJobTitle:
              type: string
              nullable: true
              example: Software Engineer
            currentCompany:
              type: string
              nullable: true
              example: Example Company
            totalDegrees:
              type: integer
              example: 1
            totalEmploymentHistory:
              type: integer
              example: 2
            totalCertifications:
              type: integer
              example: 3
            totalCourses:
              type: integer
              example: 1
            totalLicences:
              type: integer
              example: 1
        bids:
          type: object
          properties:
            total:
              type: integer
              example: 5
            active:
              type: integer
              example: 1
            won:
              type: integer
              example: 1
            lost:
              type: integer
              example: 2
            cancelled:
              type: integer
              example: 1
        notifications:
          type: object
          properties:
            total:
              type: integer
              example: 7
            unread:
              type: integer
              example: 2
            read:
              type: integer
              example: 5

    AdminDashboard:
      type: object
      properties:
        users:
          type: object
          properties:
            total:
              type: integer
              example: 15
        profiles:
          type: object
          properties:
            total:
              type: integer
              example: 12
        bids:
          type: object
          properties:
            total:
              type: integer
              example: 30
        notifications:
          type: object
          properties:
            total:
              type: integer
              example: 50

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
          example: AR Client Key
        key:
          type: string
          example: aim_abcdef1234567890
        isActive:
          type: boolean
          example: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: AR Client Key

paths:
  /:
    get:
      tags:
        - System
      summary: Root endpoint
      responses:
        '200':
          description: API running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RegisterResponseData'

  /api/auth/verify-email:
    post:
      tags:
        - Auth
      summary: Verify email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/resend-verification:
    post:
      tags:
        - Auth
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '200':
          description: Verification email resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponseData'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /api/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Forgot password initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ForgotPasswordResponseData'

  /api/auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
